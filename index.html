    <!-- Content Security Policy: defesa em profundidade contra XSS/injection.
         Permite somente origens conhecidas necessarias pro app:
           - script-src: self
           - style-src: self + Google Fonts + 'unsafe-inline' (componentes usam style="...")
           - font-src: Google Fonts CDN
           - img-src: self + data: (icons inline) + blob: (canvas exports) + https: (remote assets)
           - connect-src: Supabase REST/Realtime + telemetry self
           - frame-src: self
           - object-src 'none' impede plugins obsoletos
           - base-uri 'self' impede injection de tag <base> -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.emailjs.com https://*.ingest.us.sentry.io https://*.ingest.sentry.io; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
