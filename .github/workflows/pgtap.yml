name: pgTAP

# Roda os testes pgTAP (supabase/tests/*.sql) sempre que migration ou teste
# muda — em PR contra main e em push pra main. Filtra por path pra não
# subir Postgres no CI em PRs que só mexem em CSS/JS.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - '.github/workflows/pgtap.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pgtap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pgtap:
    name: pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase locally
        run: supabase start

      - name: Run pgTAP tests
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
