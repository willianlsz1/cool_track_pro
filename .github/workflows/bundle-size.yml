name: Bundle Size

# Mede tamanho de chunks (gzip) em PRs contra main. Limites em .size-limit.json.
# Detecta regressão; não força otimização. Sem comentário automático no PR —
# logs do step "Check bundle size" mostram limite + tamanho real por chunk.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: size-limit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size
