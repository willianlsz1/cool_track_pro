name: Bundle Size

# Mede tamanho de chunks (gzip) em PRs contra main e comenta o delta.
# Limites em .size-limit.json. Detecta regressão; não força otimização.

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: size-limit
    runs-on: ubuntu-latest
    env:
      CI_JOB_NUMBER: 1
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compare size
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build
          skip_step: install
          script: npm run size
          package_manager: npm
